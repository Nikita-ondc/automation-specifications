flows:
  - type: playground
    id: BUYER INSTRUCTIONS AND ADDRESS UPDATE FLOW
    usecase: F&B
    tags:
      - WORKBENCH
      - MANDATORY
      - REPORTABLE
    description: A buyer places a food and beverage order with specific delivery instructions and address details, then the flow exercises mid-order updates by the buyer (such as modifying delivery instructions or address) followed by the seller system acknowledging those changes and progressing the order through confirmation, preparation, and fulfillment status updates.
    config:
      $ref: ./F&B/BUYER_INSTRUCTIONS_AND_ADDRESS_UPDATE_FLOW.yaml
  - type: playground
    id: BUYER_CANCEL
    usecase: F&B
    tags:
      - WORKBENCH
      - MANDATORY
      - REPORTABLE
    description: A buyer-initiated cancellation flow for a Food & Beverage order on ONDC, covering the full transaction lifecycle from item selection and checkout through order confirmation, followed by an explicit cancel request from the buyer and the corresponding cancellation acknowledgment from the seller.
    config:
      $ref: ./F&B/BUYER_CANCEL.yaml
  - type: playground
    id: BUYER_DELIVERY
    usecase: F&B
    tags:
      - WORKBENCH
      - MANDATORY
      - REPORTABLE
    description: A buyer places a food and beverage order with delivery, progressing through item selection, order initialization, confirmation, and fulfillment status updates, followed by order modifications and their acknowledgements to complete the end-to-end delivery lifecycle.
    config:
      $ref: ./F&B/BUYER_DELIVERY.yaml
  - type: playground
    id: COMMERCIAL_MODEL_FOR_BNP/SNP_FLOW
    usecase: F&B
    tags:
      - PRAMAAN
      - MANDATORY
      - REPORTABLE
      - WORKBENCH
    description: This flow exercises the end-to-end buyer-side negotiated pricing journey in Food & Beverage retail under ONDC's BNP (Buyer Network Participant) and SNP (Seller Network Participant) commercial model, covering item selection through order confirmation. It validates that negotiated pricing terms, commercial agreements, and mandatory compliance attributes (PRAMAAN) are correctly propagated and acknowledged across the discovery-to-confirmation lifecycle.
    config:
      $ref: ./F&B/COMMERCIAL_MODEL_FOR_BNP_SNP_FLOW.yaml
  - type: playground
    id: DELIVERY_FLOW_WITH_IGM(v-1.0.0)
    usecase: F&B
    tags:
      - PRAMAAN
      - MANDATORY
      - REPORTABLE
      - WORKBENCH
    description: A complete Food & Beverage retail order lifecycle covering buyer-initiated item selection, order initialization, confirmation, and real-time delivery status tracking, followed by post-order grievance redressal through the Issue & Grievance Management (IGM) protocol to raise, respond to, and resolve a delivery-related complaint.
    config:
      $ref: ./F&B/DELIVERY_FLOW_WITH_IGM_v-1_0_0_.yaml
  - type: playground
    id: DELIVERY_FLOW_WITH_IGM(v-2.0.0)
    usecase: F&B
    tags:
      - PRAMAAN
      - MANDATORY
      - REPORTABLE
      - WORKBENCH
    description: Covers an end-to-end Food & Beverage delivery order lifecycle — from item selection and order confirmation through real-time delivery tracking and multi-stage fulfillment status updates — followed by multiple Issue and Grievance Management (IGM) cycles in which the buyer raises successive post-order complaints, the seller app responds to each grievance, and the final issue triggers an order update to reflect the resolution.
    config:
      $ref: ./F&B/DELIVERY_FLOW_WITH_IGM_v-2_0_0_.yaml
  - type: playground
    id: DELIVERY_FLOW_WITH_IGM_No_Action(v-2.0.0)
    usecase: F&B
    tags:
      - WORKBENCH
      - MANDATORY
    description: A complete Food & Beverage delivery order lifecycle covering discovery, initialization, confirmation, and multi-stage fulfillment status tracking, followed by grievance redressal via three IGM issue cycles (without seller action) where the issue remains unresolved, culminating in a final order status update.
    config:
      $ref: ./F&B/DELIVERY_FLOW_WITH_IGM_No_Action_v-2_0_0_.yaml
  - type: playground
    id: DELIVERY_FLOW_WITH_IGM_Rejection(v-2.0.0)
    usecase: F&B
    tags:
      - PRAMAAN
      - MANDATORY
      - REPORTABLE
      - WORKBENCH
    description: A complete F&B delivery order lifecycle — from item selection, order confirmation, and real-time delivery tracking through multiple status transitions — culminating in a multi-round Issue and Grievance Management (IGM) scenario where the buyer raises a post-order grievance that is ultimately rejected by the counterparty, with the final resolution acknowledged via an order update.
    config:
      $ref: ./F&B/DELIVERY_FLOW_WITH_IGM_Rejection_v-2_0_0_.yaml
  - type: playground
    id: FORCE_CANCEL
    usecase: F&B
    tags:
      - WORKBENCH
      - MANDATORY
      - REPORTABLE
    description: A buyer-initiated force cancellation flow in an F&B order lifecycle, covering order placement (select through on_confirm), status progression across multiple state updates, explicit cancel requests from the buyer side, and a final update acknowledging the cancellation outcome.
    config:
      $ref: ./F&B/FORCE_CANCEL.yaml
  - type: playground
    id: FULL_CATALOG
    usecase: F&B
    tags:
      - PRAMAAN
      - MANDATORY
      - REPORTABLE
      - WORKBENCH
    description: A buyer app broadcasts a full catalog discovery request to seller apps on the ONDC network, enabling F&B sellers to respond with their complete menu and item listings for browsing and selection.
    config:
      $ref: ./F&B/FULL_CATALOG.yaml
  - type: playground
    id: INCREMENTAL_CATALOG
    usecase: F&B
    tags:
      - PRAMAAN
      - MANDATORY
      - REPORTABLE
      - WORKBENCH
    description: Validates the F&B incremental catalog discovery mechanism where a buyer network participant issues a search and the seller network participant responds with an initial catalog followed by successive incremental delta pushes, allowing the buyer app to maintain a current view of available items without requiring a full catalog re-synchronization.
    config:
      $ref: ./F&B/INCREMENTAL_CATALOG.yaml
  - type: playground
    id: MULTI_OPTION_FULFILLMENT_FLOW
    usecase: F&B
    tags:
      - WORKBENCH
      - MANDATORY
    description: A food and beverage buyer selects an item offering multiple fulfillment options (e.g., dine-in, takeaway, or delivery), negotiates and confirms the order through the full ONDC transaction lifecycle, and tracks the order as it progresses through multiple seller-side status updates until fulfillment is complete.
    config:
      $ref: ./F&B/MULTI_OPTION_FULFILLMENT_FLOW.yaml
  - type: playground
    id: OFFERS_FLOW
    usecase: F&B
    tags:
      - WORKBENCH
      - MANDATORY
      - REPORTABLE
    description: This flow exercises the end-to-end offer discovery and order placement journey in an F&B transaction, where a buyer selects an item with applicable offers, initiates and confirms the order, and receives a system-triggered update reflecting offer-adjusted pricing or fulfillment details from the seller.
    config:
      $ref: ./F&B/OFFERS_FLOW.yaml
  - type: playground
    id: ORDER_FLOW
    usecase: F&B
    tags:
      - PRAMAAN
      - MANDATORY
      - REPORTABLE
      - WORKBENCH
    description: End-to-end Food & Beverage ordering flow covering buyer-side item selection, order initialisation, and confirmation by the seller, followed by real-time order lifecycle status progression (order accepted, being prepared, picked up, and delivered) with package tracking by the logistics provider.
    config:
      $ref: ./F&B/ORDER_FLOW.yaml
  - type: playground
    id: OUT_OF_STOCK
    usecase: F&B
    tags:
      - WORKBENCH
      - MANDATORY
    description: A buyer in an F&B ordering journey selects items from a seller, receives an out-of-stock signal in the catalog quote response, revises the cart with available items, and proceeds through order initialisation, confirmation, and fulfillment — with the seller publishing multiple incremental status updates and the buyer tracking the active delivery until completion.
    config:
      $ref: ./F&B/OUT_OF_STOCK.yaml
  - type: playground
    id: OUT_OF_STOCK(ERROR-CODE)
    usecase: F&B
    tags:
      - WORKBENCH
      - MANDATORY
      - REPORTABLE
    description: The buyer selects an item from a Food & Beverage catalog that is currently out of stock, and the seller platform responds via on_select with an appropriate error code indicating the item's unavailability, allowing the buyer app to surface the out-of-stock condition to the end customer.
    config:
      $ref: ./F&B/OUT_OF_STOCK_ERROR-CODE_.yaml
  - type: playground
    id: RETURN_FLOW
    usecase: F&B
    tags:
      - PRAMAAN
      - MANDATORY
      - REPORTABLE
      - WORKBENCH
    description: Covers the end-to-end lifecycle of an F&B order that undergoes a post-delivery return, beginning with item selection and order confirmation, progressing through multiple seller-side status transitions (accepted, packed, picked up, out for delivery, delivered), and concluding with a buyer-initiated return request followed by seller acknowledgement and liquidation disposition of the returned goods.
    config:
      $ref: ./F&B/RETURN_FLOW.yaml
  - type: playground
    id: RTO_PLUS_PART_CANCELLATION
    usecase: F&B
    tags:
      - PRAMAAN
      - MANDATORY
      - REPORTABLE
      - WORKBENCH
    description: Covers an F&B order where the seller initiates a partial item cancellation after confirmation, followed by a delivery attempt that fails and triggers a Return to Origin (RTO), resulting in full seller-side cancellation of the remaining order with status transitions tracking the lifecycle from packing through return.
    config:
      $ref: ./F&B/RTO_PLUS_PART_CANCELLATION.yaml
  - type: playground
    id: SELF_PICKUP
    usecase: F&B
    tags:
      - WORKBENCH
      - MANDATORY
      - REPORTABLE
    description: A buyer selects food and beverage items from an outlet, places and confirms an order for self-pickup, and collects it in person from the seller's premises without involving a delivery agent. The flow exercises the full order lifecycle — from item selection through order confirmation to progressive status updates reflecting order acceptance, preparation, and fulfillment at the point of pickup.
    config:
      $ref: ./F&B/SELF_PICKUP.yaml
  - type: playground
    id: SLOTTED_DELIVERY
    usecase: F&B
    tags:
      - WORKBENCH
      - MANDATORY
      - REPORTABLE
    description: A buyer selects F&B items from a seller, chooses a preferred delivery time slot, and confirms the order; the flow then tracks the full fulfillment lifecycle through multiple order-status transitions covering acceptance, preparation, out-for-delivery, and final doorstep delivery within the scheduled slot.
    config:
      $ref: ./F&B/SLOTTED_DELIVERY.yaml
