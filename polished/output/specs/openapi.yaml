openapi: 3.1.0
info:
  title: ONDC Specification
  description: ONDC Specification
  version: 2.0.1
  domain: ONDC:FIS13
paths:
  /cancel:
    post:
      operationId: cancel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                context: &context
                  type: object
                  properties:
                    action:
                      type: string
                    domain:
                      type: string
                    location: &location
                      type: object
                      properties:
                        country: &country
                          type: object
                          properties:
                            code:
                              type: string
                        city: *country
                    timestamp:
                      type: string
                    bap_id:
                      type: string
                    bap_uri:
                      type: string
                    bpp_id:
                      type: string
                    bpp_uri:
                      type: string
                    transaction_id:
                      type: string
                    message_id:
                      type: string
                    version:
                      type: string
                    ttl:
                      type: string
                message:
                  type: object
                  properties:
                    order_id:
                      type: string
                    cancellation_reason_id:
                      type: string
                    descriptor:
                      type: object
                      properties:
                        short_desc:
                          type: string
      responses: &responses
        "200":
          description: Synchronous ACK/NACK response
          content:
            application/json:
              schema: &a1
                type: object
                properties:
                  message:
                    type: object
                    properties:
                      ack:
                        properties:
                          status:
                            enum:
                              - ACK
                              - NACK
                          tags:
                            description: A list of tags containing any additional information sent along
                              with the Acknowledgement.
                            type: array
                            items:
                              description: A collection of tag objects with group level attributes. For
                                detailed documentation on the Tags and Tag
                                Groups schema go to
                                https://github.com/beckn/protocol-specifications/discussions/316
                              type: object
                              additionalProperties: false
                              properties:
                                display:
                                  description: Indicates the display properties of the tag group. If display is
                                    set to false, then the group will not be
                                    displayed. If it is set to true, it should
                                    be displayed. However, group-level display
                                    properties can be overriden by individual
                                    tag-level display property. As this schema
                                    is purely for catalog display purposes, it
                                    is not recommended to send this value during
                                    search.
                                  type: boolean
                                  default: true
                                descriptor:
                                  description: Description of the TagGroup, can be used to store detailed
                                    information.
                                  properties: &properties
                                    name:
                                      type: string
                                    code:
                                      type: string
                                    short_desc:
                                      type: string
                                    long_desc:
                                      type: string
                                    additional_desc:
                                      type: object
                                      additionalProperties: false
                                      properties:
                                        url:
                                          type: string
                                        content_type:
                                          type: string
                                          enum:
                                            - text/plain
                                            - text/html
                                            - application/json
                                    media:
                                      type: array
                                      items:
                                        description: This object contains a url to a media file.
                                        type: object
                                        additionalProperties: false
                                        properties:
                                          mimetype:
                                            description: indicates the nature and format of the document, file, or
                                              assortment of bytes. MIME types
                                              are defined and standardized in
                                              IETF's RFC 6838
                                            type: string
                                          url:
                                            description: The URL of the file
                                            type: string
                                            format: uri
                                          signature:
                                            description: The digital signature of the file signed by the sender
                                            type: string
                                          dsa:
                                            description: The signing algorithm used by the sender
                                            type: string
                                    images:
                                      type: array
                                      items:
                                        description: Describes an image
                                        type: object
                                        additionalProperties: false
                                        properties:
                                          url:
                                            description: URL to the image. This can be a data url or an remote url
                                            type: string
                                            format: uri
                                          size_type:
                                            description: The size of the image. The network policy can define the default
                                              dimensions of each type
                                            type: string
                                            enum:
                                              - xs
                                              - sm
                                              - md
                                              - lg
                                              - xl
                                              - custom
                                          width:
                                            description: Width of the image in pixels
                                            type: string
                                          height:
                                            description: Height of the image in pixels
                                            type: string
                                  type: object
                                list:
                                  description: An array of Tag objects listed under this group. This property can
                                    be set by BAPs during search to narrow the
                                    `search` and achieve more relevant results.
                                    When received during `on_search`, BAPs must
                                    render this list under the heading described
                                    by the `name` property of this schema.
                                  type: array
                                  items:
                                    description: Describes a tag. This is used to contain extended metadata. This
                                      object can be added as a property to any
                                      schema to describe extended attributes.
                                      For BAPs, tags can be sent during search
                                      to optimize and filter search results.
                                      BPPs can use tags to index their catalog
                                      to allow better search functionality. Tags
                                      are sent by the BPP as part of the catalog
                                      response in the `on_search` callback. Tags
                                      are also meant for display purposes. Upon
                                      receiving a tag, BAPs are meant to render
                                      them as name-value pairs. This is
                                      particularly useful when rendering tabular
                                      information about a product or service.
                                    type: object
                                    additionalProperties: false
                                    properties:
                                      descriptor:
                                        description: Description of the Tag, can be used to store detailed information.
                                        properties: *properties
                                        type: object
                                      value:
                                        description: The value of the tag. This set by the BPP and rendered as-is by the
                                          BAP.
                                        type: string
                                      display:
                                        description: This value indicates if the tag is intended for display purposes.
                                          If set to `true`, then this tag must
                                          be displayed. If it is set to `false`,
                                          it should not be displayed. This value
                                          can override the group display value.
                                        type: boolean
                        description: Describes the acknowledgement sent in response to an API call. If
                          the implementation uses HTTP/S, then Ack must be
                          returned in the same session. Every API call to a BPP
                          must be responded to with an Ack whether the BPP
                          intends to respond with a callback or not. This has
                          one property called `status` that indicates the status
                          of the Acknowledgement.
                        type: object
                    required:
                      - ack
                  error:
                    description: Describes an error object that is returned by a BAP, BPP or BG as a
                      response or callback to an action by another network
                      participant. This object is sent when any request received
                      by a network participant is unacceptable. This object can
                      be sent either during Ack or with the callback.
                    type: object
                    additionalProperties: false
                    properties:
                      code:
                        type: string
                        description: Standard error code. For full list of error codes, refer to
                          docs/protocol-drafts/BECKN-005-ERROR-CODES-DRAFT-01.md
                          of this repo"
                      paths:
                        type: string
                        description: Path to json schema generating the error. Used only during json
                          schema validation errors
                      message:
                        type: string
                        description: Human readable message describing the error. Used mainly for
                          logging. Not recommended to be shown to the user.
                required:
                  - message
  /confirm:
    post:
      operationId: confirm
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                context: *context
                message:
                  type: object
                  properties:
                    order:
                      type: object
                      properties:
                        provider: &provider
                          type: object
                          properties:
                            id:
                              type: string
                        items: &items
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                              parent_item_id:
                                type: string
                              xinput:
                                type: object
                                properties:
                                  form_response:
                                    type: object
                                    properties:
                                      submission_id:
                                        type: string
                                      status:
                                        type: string
                                  form: *provider
                        fulfillments:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                              customer: &customer
                                type: object
                                properties:
                                  contact: &contact
                                    type: object
                                    properties:
                                      email:
                                        type: string
                                      phone:
                                        type: string
                                  person: &person
                                    type: object
                                    properties:
                                      name:
                                        type: string
                        payments: &payments
                          type: array
                          items:
                            type: object
                            properties:
                              collected_by:
                                type: string
                              status:
                                type: string
                              type:
                                type: string
                              params:
                                type: object
                                properties:
                                  amount:
                                    type: string
                                  bank_account_number:
                                    type: string
                                  bank_code:
                                    type: string
                                  currency:
                                    type: string
      responses: *responses
  /init:
    post:
      operationId: init
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                context: *context
                message:
                  type: object
                  properties:
                    order:
                      type: object
                      properties:
                        items: *items
                        fulfillments:
                          type: array
                          items:
                            type: object
                            properties:
                              customer: *customer
                        provider: *provider
                        payments: *payments
      responses: *responses
  /on_cancel:
    post:
      operationId: on_cancel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                context: *context
                message:
                  type: object
                  properties:
                    order:
                      type: object
                      properties:
                        id:
                          type: string
                        status:
                          type: string
                        created_at:
                          type: string
                        updated_at:
                          type: string
                        provider: &provider_2
                          type: object
                          properties:
                            id:
                              type: string
                            descriptor:
                              type: object
                              properties:
                                name:
                                  type: string
                                short_desc:
                                  type: string
                                long_desc:
                                  type: string
                                images:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      url:
                                        type: string
                        items:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                              parent_item_id:
                                type: string
                              category_ids: &category_ids
                                type: array
                                items:
                                  type: string
                              descriptor: &descriptor
                                type: object
                                properties:
                                  name:
                                    type: string
                                  short_desc:
                                    type: string
                              price: &price
                                type: object
                                properties:
                                  value:
                                    type: string
                                  currency:
                                    type: string
                              time: &time
                                type: object
                                properties:
                                  duration:
                                    type: string
                                  label:
                                    type: string
                              fulfillment_ids: *category_ids
                              tags: &tags
                                type: array
                                items: &items_2
                                  type: object
                                  properties:
                                    descriptor: *country
                        fulfillments: &fulfillments_2
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                              state: *items_2
                              customer: &customer_2
                                type: object
                                properties:
                                  contact: *contact
                        payments:
                          type: array
                          items:
                            type: object
                            properties:
                              collected_by:
                                type: string
                              params:
                                type: object
                                properties:
                                  amount:
                                    type: string
                                  bank_account_number:
                                    type: string
                                  bank_code:
                                    type: string
                                  currency:
                                    type: string
                                  transaction_id:
                                    type: string
                              status:
                                type: string
                              type:
                                type: string
                        quote: &quote
                          type: object
                          properties:
                            id:
                              type: string
                            price: *price
                            breakup:
                              type: array
                              items:
                                type: object
                                properties:
                                  price: *price
                                  title:
                                    type: string
      responses: *responses
  /on_confirm:
    post:
      operationId: on_confirm
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                context: *context
                message:
                  type: object
                  properties:
                    order:
                      type: object
                      properties:
                        id:
                          type: string
                        status:
                          type: string
                        created_at:
                          type: string
                        updated_at:
                          type: string
                        fulfillments: &fulfillments
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                              customer: *customer_2
                        items:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                              time: *time
                              descriptor: *descriptor
                              parent_item_id:
                                type: string
                              fulfillment_ids: *category_ids
                              price: *price
                              tags: *tags
                        payments: &payments_2
                          type: array
                          items:
                            type: object
                            properties:
                              collected_by:
                                type: string
                              params:
                                type: object
                                properties:
                                  bank_account_number:
                                    type: string
                                  bank_code:
                                    type: string
                                  currency:
                                    type: string
                              status:
                                type: string
                              type:
                                type: string
                        provider: *provider_2
                        quote: *quote
      responses: *responses
  /on_init:
    post:
      operationId: on_init
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                context: *context
                message:
                  type: object
                  properties:
                    order:
                      type: object
                      properties:
                        provider: *provider
                        items: &items_3
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                              parent_item_id:
                                type: string
                              category_ids: *category_ids
                              descriptor: *descriptor
                              price: *price
                              time: *time
                              xinput:
                                type: object
                                properties:
                                  head:
                                    type: object
                                    properties:
                                      descriptor: *person
                                      index:
                                        type: object
                                        properties:
                                          min:
                                            type: string
                                          max:
                                            type: string
                                          cur:
                                            type: string
                                      headings: *category_ids
                                  form:
                                    type: object
                                    properties:
                                      id:
                                        type: string
                                      url:
                                        type: string
                                      mime_type:
                                        type: string
                                      resubmit:
                                        type: string
                                      multiple_sumbissions:
                                        type: string
                                  required:
                                    type: string
                              tags: *tags
                        fulfillments: *fulfillments
                        payments: *payments_2
                        quote: *quote
      responses: *responses
  /on_search:
    post:
      operationId: on_search
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                context: *context
                message:
                  type: object
                  properties:
                    catalog:
                      type: object
                      properties:
                        descriptor: *person
                        providers:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                              descriptor: *person
                              categories:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    id:
                                      type: string
                                    descriptor:
                                      type: object
                                      properties:
                                        name:
                                          type: string
                                        code:
                                          type: string
                              items:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    id:
                                      type: string
                                    category_ids: *category_ids
                                    time: *time
                              payments:
                                type: array
                                items: &items_4
                                  type: object
                                  properties:
                                    collected_by:
                                      type: string
      responses: *responses
  /on_select:
    post:
      operationId: on_select
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                context: *context
                message:
                  type: object
                  properties:
                    order:
                      type: object
                      properties:
                        provider: *provider_2
                        items: *items_3
                        quote: *quote
      responses: *responses
  /on_update:
    post:
      operationId: on_update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                context: *context
                message:
                  type: object
                  properties:
                    order:
                      type: object
                      properties:
                        id:
                          type: string
                        status:
                          type: string
                        created_at:
                          type: string
                        updated_at:
                          type: string
                        provider:
                          type: object
                          properties:
                            id:
                              type: string
                            descriptor:
                              type: object
                              properties:
                                name:
                                  type: string
                                short_desc:
                                  type: string
                                long_desc:
                                  type: string
                                images:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      url:
                                        type: string
                                      size_type:
                                        type: string
                        items:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                              category_ids: *category_ids
                              descriptor: *descriptor
                              time: *time
                              price: *price
                              fulfillment_ids: *category_ids
                              tags: *tags
                        fulfillments: *fulfillments_2
                        payments:
                          type: array
                          items:
                            type: object
                            properties:
                              collected_by:
                                type: string
                              status:
                                type: string
                              type:
                                type: string
                              params:
                                type: object
                                properties:
                                  amount:
                                    type: string
                                  currency:
                                    type: string
                        quote: *quote
      responses: *responses
  /search:
    post:
      operationId: search
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                context:
                  type: object
                  properties:
                    location: *location
                    domain:
                      type: string
                    timestamp:
                      type: string
                    bap_id:
                      type: string
                    bap_uri:
                      type: string
                    transaction_id:
                      type: string
                    message_id:
                      type: string
                    version:
                      type: string
                    ttl:
                      type: string
                message:
                  type: object
                  properties:
                    intent:
                      type: object
                      properties:
                        category: *items_2
                        payment: *items_4
      responses: *responses
  /select:
    post:
      operationId: select
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                context: *context
                message:
                  type: object
                  properties:
                    order:
                      type: object
                      properties:
                        provider: *provider
                        items:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                              parent_item_id:
                                type: string
      responses: *responses
  /status:
    post:
      operationId: status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                context: *context
      responses: *responses
  /update:
    post:
      operationId: update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                context: *context
                message:
                  type: object
                  properties:
                    update_target:
                      type: string
                    order: *provider
      responses: *responses
