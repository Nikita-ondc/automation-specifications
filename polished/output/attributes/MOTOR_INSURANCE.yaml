                  owner: BAP
                  type: string
              _description:
                required: false
                usage: ""
                info: Container for person details BAP specifies in search; BPP echoes in on_search response.
                owner: BAP
                type: object
            _description:
              required: false
              usage: ""
              info: Container for agent details provided by BPP to identify the representative assigned to this fulfillment.
              owner: BAP
              type: object
          _description:
            required: false
            usage: ""
            info: Container for fulfillment preferences BAP specifies in search; BPP echoes in on_search response.
            owner: BAP
            type: object
        _description:
          required: false
          usage: ""
          info: Container expressing the BAP's intent to search for and purchase health insurance coverage.
          owner: BAP
          type: object
      _description:
        required: false
        usage: ""
        info: The search request that the BAP sends to query available health insurance products.
        owner: BAP
        type: object
    _description:
      required: false
      usage: --
      info: <placeholder description>
      owner: BAP
      type: object
