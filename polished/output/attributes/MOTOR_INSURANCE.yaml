meta:
  use_case_id: MOTOR INSURANCE
attribute_set:
  search:
    context:
      location:
        country:
          code:
            _description:
              required: true
              usage: IND
              info: Describes country code as per ISO 3166-1 and ISO 3166-2 format
              owner: BAP
              type: enum
              enums:
                - code: IND
                  description: Represents the country
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: false
            usage: ""
            info: Container for country information within the service location, identifying the nation for insurance services.
            owner: BAP
            type: object
        city:
          code:
            _description:
              required: true
              usage: "*"
              info: Describes the city code this location is, or is located within
              owner: BAP
              type: enum
              enums:
                - code: std:080
                  description: Represent the city code that identifies the cities. In case of '*' it will fetch all the cities where service is being provided.
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: false
            usage: ""
            info: Container for city information that the BAP includes in the location to specify the city where insurance services are sought.
            owner: BAP
            type: object
        _description:
          required: false
          usage: ""
          info: Container for the service location that the BAP specifies in the search request to identify the geographic area for insurance coverage.
          owner: BAP
          type: object
      domain:
        _description:
          required: true
          usage: ONDC:FIS13
          info: Describes domain code that is relevant to this transaction context
          owner: BAP
          type: enum
          enums:
            - code: ONDC:FIS13
              description: Updated domain namespace
              reference: <PR/Issue/Discussion Links md format text>
      timestamp:
        _description:
          required: true
          usage: 2023-03-23T04:41:16Z
          info: Describes tme of request generation in RFC3339 format
          owner: BAP
          type: string
      bap_id:
        _description:
          required: true
          usage: fis.test.bap.io
          info: Describes subscriber ID of the BAP
          owner: BAP
          type: string
      transaction_id:
        _description:
          required: true
          usage: 6743e9e2
          info: Describes  a unique value which persists across all API calls
          owner: BAP
          type: string
      message_id:
        _description:
          required: true
          usage: 13ba8018f176
          info: Describes a unique value which persists during a request / callback cycle.
          owner: BAP
          type: string
      version:
        _description:
          required: true
          usage: 2.0.1
          info: Describes the version of transaction protocol being used by the sender.
          owner: BAP
          type: integer
      action:
        _description:
          required: true
          usage: search
          info: Describes the Beckn protocol method being called by the sender and executed at the receiver.
          owner: BAP
          type: enum
          enums:
            - code: search
              description: buyer app specifies the search intent
              reference: <PR/Issue/Discussion Links md format text>
            - code: on_search
              description: seller app responds with the catalog based on the search intent
              reference: <PR/Issue/Discussion Links md format text>
            - code: select
              description: buyer app specifies the items & quantity selected by a buyer
              reference: <PR/Issue/Discussion Links md format text>
            - code: on_select
              description: seller app responds with the serviceability info, quote & O2D TAT for selected items;
              reference: <PR/Issue/Discussion Links md format text>
            - code: init
              description: buyer & seller app specify & agree to the terms & conditions prior to placing the order;
              reference: <PR/Issue/Discussion Links md format text>
            - code: on_init
              description: buyer & seller app specify & agree to the terms & conditions prior to placing the order;
              reference: <PR/Issue/Discussion Links md format text>
            - code: confirm
              description: buyer app places the order on behalf of the buyer;
              reference: <PR/Issue/Discussion Links md format text>
            - code: on_confirm
              description: seller app responds to the order placed either through auto-acceptance or deferred acceptance or rejection of the order
              reference: <PR/Issue/Discussion Links md format text>
            - code: update
              description: updates in the serviceable loc happens here
              reference: <PR/Issue/Discussion Links md format text>
            - code: on_update
              description: seller app responds with serviceable
              reference: <PR/Issue/Discussion Links md format text
            - code: cancel
              description: Cancellation of ride
              reference: <PR/Issue/Discussion Links md format text>
            - code: on_cancel
              description: Specifiy the cancellation of the state
              reference: <PR/Issue/Discussion Links md format text>
            - code: track
              description: Track the order
              reference: <PR/Issue/Discussion Links md format text>
            - code: on_track
              description: Return tracking infomation of the order
              reference: <PR/Issue/Discussion Links md format text
            - code: status
              description: Request for status of the vehicle
              reference: <PR/Issue/Discussion Links md format text>
            - code: on_status
              description: Return order with status , Driver pickup - driver drop
              reference: <PR/Issue/Discussion Links md format text>
            - code: support
              description: Fetch support information related to a particular order
              reference: <PR/Issue/Discussion Links md format text>
            - code: on_support
              description: Return support information related to order
              reference: <PR/Issue/Discussion Links md format text
      bap_uri:
        _description:
          required: true
          usage: https://fis.test.bap.io/
          info: Describes subscriber URL of the BAP for accepting callbacks from BPPs.
          owner: BAP
          type: string
      ttl:
        _description:
          required: true
          usage: PT30S
          info: Describes the duration in ISO8601 format after timestamp for which this message holds valid
          owner: BAP
          type: string
      bpp_id:
        _description:
          required: false
          usage: fis.test.bpp.io
          info: Describes subscriber ID of the BPP
          owner: BPP
          type: string
      bpp_uri:
        _description:
          required: false
          usage: https://fis.test.bpp.io/
          info: Describes subscriber URL of the BPP for accepting calls from BAPs.
          owner: BPP
          type: string
      _description:
        required: false
        usage: ""
        info: Container for transaction metadata that the BAP includes in the search request to establish transaction context.
        owner: BAP
        type: object
    message:
      intent:
        category:
          descriptor:
            code:
              _description:
                required: true
                usage: MOTOR_INSURANCE
                info: Type of insurance (health, marine, motor)
                owner: BAP
                type: enum
                enums:
                  - code: MOTOR_INSURANCE
                    description: Describes a type of insurance that provides coverage for various motor vehicles
                    reference: <PR/Issue/Discussion Links md format text
                  - code: TWO_WHEELER_COMPRIHENSIVE_INSURANCE
                    description: Describes a type of motor insurance plan that covers the insured person against both - own damages and any third party liabilities
                    reference: <PR/Issue/Discussion Links md format text>
                  - code: TWO_WHEELER_THIRD_PARTY_INSURANCE
                    description: Describes a type of motor insurance plan that covers the insured person against both - own damages and any third party liabilities
                    reference: <PR/Issue/Discussion Links md format text>
                  - code: TWO_WHEELER_OWN_DAMAGE
                    description: Describes a type of motor insurance plan that covers the insured person against both - own damages and any third party liabilities
                    reference: <PR/Issue/Discussion Links md format text>
                  - code: FOUR_WHEELER_COMPRIHENSIVE_INSURANCE
                    description: Describes a type of motor insurance plan that covers the insured person against both - own damages and any third party liabilities
                    reference: <PR/Issue/Discussion Links md format text>
                  - code: FOUR_WHEELER_THIRD_PARTY_INSURANCE
                    description: Describes a type of motor insurance plan that covers the insured person against both - own damages and any third party liabilities
                    reference: <PR/Issue/Discussion Links md format text>
                  - code: FOUR_WHEELER_OWN_DAMAGE
                    description: Describes a type of motor insurance plan that covers the insured person against both - own damages and any third party liabilities
                    reference: <PR/Issue/Discussion Links md format text>
                  - code: FOUR_WHEELER_INSURANCE
                    description: Describes the transfer type insurance
                    reference: <PR/Issue/Discussion Links md format text>
                  - code: TWO_WHEELER_INSURANCE
                    description: Describes the transfer type insurance
                    reference: <PR/Issue/Discussion Links md format text>
            _description:
              required: false
              usage: ""
              info: Descriptor providing the code and name that identify the insurance category.
              owner: BAP
              type: object
          _description:
            required: false
            usage: ""
            info: Container identifying the type or category of health insurance product the BAP is searching for.
            owner: BAP
            type: object
        provider:
          id:
            _description:
              required: false
