                    info: Describes unique form id.
                    owner: BPP
                    type: string
                _description:
                  required: false
                  usage: ""
                  info: Container for the form collecting additional input; the BAP populates form.id from the customer's earlier session selection.
                  owner: BAP
                  type: object
              form_response:
                status:
                  _description:
                    required: false
                    usage: SUCCESS
                    info: |
                      Describes the status of form
                    owner: BAP
                    type: string
                submission_id:
                  _description:
                    required: false
                    usage: cb8d-42fe-900e-dfecdede16fb
                    info: Unique submission id which a borrower got as a reponse after successful submission of form
                    owner: BAP
                    type: string
                _description:
                  required: false
                  usage: ""
                  info: The BAP populates this container in search to carry form submission response information when referencing a prior form submission.
                  owner: BAP
                  type: object
              _description:
                required: false
                usage: ""
                info: Container for additional input required from the customer to purchase or avail this item.
                owner: BAP
                type: object
            _description:
              required: false
              usage: ""
              info: Array of items within the selected provider; the BAP populates each item's id from the customer's prior session selection.
              owner: BAP
              type: object
          _description:
            required: false
            usage: ""
            info: Container identifying which provider the BAP is searching against; the BAP populates provider.id from the customer's prior session selection.
            owner: BAP
            type: object
        payment:
          collected_by:
            _description:
              required: false
              usage: BPP
              info: "This field indicates who is the collector of payment. "
              owner: BAP
              type: string
          _description:
            required: false
            usage: ""
            info: Container for payment settlement terms BAP specifies in search to indicate how the customer wants to pay for the insurance service.
            owner: BAP
            type: object
          tags:
            BUYER_FINDER_FEES:
              _description:
                required: true
                usage: --
                info: Describes Buyer finder fee
                owner: BAP
                type: object
            SETTLEMENT_TERMS:
              _description:
                required: true
                usage: --
                info: Describes settlement terms
                owner: BAP
                type: object
            _description:
              required: false
              usage: --
              info: <placeholder description>
              owner: BAP
              type: object
        fulfillment:
          agent:
